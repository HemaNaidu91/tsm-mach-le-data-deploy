name: Seed Database

on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      # 1. Checkout repo
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Authenticate to Google Cloud
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      # 3. Setup gcloud
      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      # 4. Install Cloud SQL Proxy
      - name: Install Cloud SQL Proxy
        run: |
          curl -o cloud-sql-proxy \
            https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.2/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy

      # 5. Start Cloud SQL Proxy
      - name: Start Cloud SQL Proxy
        run: |
          ./cloud-sql-proxy \
            ${{ secrets.GCP_PROJECT_ID }}:${{ vars.GCP_REGION }}:cinematch-db \
            --port 5432 &
          sleep 8

      # 6. Install PostgreSQL client
      - name: Install psql
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      # 7. Ensure database exists (safe version)
      - name: Ensure database exists
        env:
          PGPASSWORD: ${{ secrets.CLOUD_SQL_PASSWORD }}
        run: |
          psql -h 127.0.0.1 -U ${{ vars.CLOUD_SQL_USER }} -d postgres -tc \
          "SELECT 1 FROM pg_database WHERE datname='cinematch'" | grep -q 1 || \
          psql -h 127.0.0.1 -U ${{ vars.CLOUD_SQL_USER }} -d postgres -c \
          "CREATE DATABASE cinematch"

      # 8. Seed database (FIXED PATH)
      - name: Seed database
        env:
          PGPASSWORD: ${{ secrets.CLOUD_SQL_PASSWORD }}
        run: |
          sed \
            -e '/^\\restrict/d' \
            -e '/^SET transaction_timeout/d' \
            -e '/OWNER TO postgres;/d' \
            postgres_dump/ml_movies_small.sql | \
          psql \
            -h 127.0.0.1 \
            -U ${{ vars.CLOUD_SQL_USER }} \
            -d cinematch \
            --set ON_ERROR_STOP=1

      # 9. Verify tables
      - name: Verify tables
        env:
          PGPASSWORD: ${{ secrets.CLOUD_SQL_PASSWORD }}
        run: |
          psql -h 127.0.0.1 \
            -U ${{ vars.CLOUD_SQL_USER }} \
            -d cinematch \
            -c "\dt movie.*"
