- name: Start Cloud SQL Auth Proxy
  run: |
    ./cloud-sql-proxy \
      ${{ secrets.GCP_PROJECT_ID }}:${{ vars.GCP_REGION }}:cinematch-db \
      --port 5432 &
    sleep 10

- name: Install psql client
  run: sudo apt-get install -y postgresql-client

- name: Create database if not exists
  env:
    PGPASSWORD: ${{ secrets.CLOUD_SQL_PASSWORD }}
  run: |
    psql \
      --host=127.0.0.1 \
      --port=5432 \
      --username=postgres \
      --dbname=postgres \
      -c "CREATE DATABASE cinematch;" || true

- name: Seed database
  env:
    PGPASSWORD: ${{ secrets.CLOUD_SQL_PASSWORD }}
  run: |
    sed \
      -e '/^\\restrict/d' \
      -e '/^SET transaction_timeout/d' \
      -e '/OWNER TO postgres;/d' \
      src/postgresql/ml_movies_small.sql | \
    psql \
      --host=127.0.0.1 \
      --port=5432 \
      --username=postgres \
      --dbname=cinematch \
      -v ON_ERROR_STOP=1
